<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心语表白墙</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary-color: #ff6b8b;
            --secondary-color: #6a5af9;
            --light-pink: #ffe6ee;
            --light-purple: #f0eeff;
            --text-dark: #333;
            --text-light: #666;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #ffe6ee 0%, #f0eeff 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }
        
        /* 引导界面 */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            z-index: 2000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .welcome-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .welcome-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        
        .welcome-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        
        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .welcome-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .welcome-btn {
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .enter-btn {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .admin-btn {
            background: #f5f5f5;
            color: var(--text-dark);
        }
        
        .welcome-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        /* 管理员登录模态框 */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        
        .admin-modal.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .admin-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
        }
        
        .admin-title {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* 主界面 */
        .main-content {
            display: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部样式 */
        header {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px 0;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        h1 i {
            color: #ffeb3b;
        }
        
        .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        /* 浮动发布按钮 */
        .float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 6px 20px rgba(255, 107, 139, 0.3);
            cursor: pointer;
            z-index: 100;
            transition: var(--transition);
        }
        
        .float-btn:hover {
            transform: scale(1.1);
        }
        
        /* 发布表白模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-light);
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 139, 0.3);
        }
        
        /* 表白分类 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .category-btn {
            padding: 8px 16px;
            background-color: #f5f5f5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        
        .category-btn.active, .category-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        /* 表白列表 */
        .confession-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .confession-item {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }
        
        .confession-item:hover {
            transform: translateY(-5px);
        }
        
        .confession-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .confession-type {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .love { background-color: #ffe6ee; color: #e91e63; }
        .friendship { background-color: #e8f4fd; color: #2196f3; }
        .secret { background-color: #f3e5f5; color: #9c27b0; }
        .thanks { background-color: #e8f5e9; color: #4caf50; }
        
        .confession-date {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .confession-to {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        
        .confession-content {
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 15px;
        }
        
        .confession-from {
            text-align: right;
            font-style: italic;
            color: var(--text-light);
            padding-right: 30px;
            position: relative;
            z-index: 0;
        }
        
        .delete-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            z-index: 1;
        }
        
        .delete-btn:hover {
            transform: scale(1.1);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ddd;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        /* 管理员状态提示 */
        .admin-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        
        /* 响应式调整 */
        @media (max-width: 576px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .confession-item {
                padding: 20px;
            }
            
            .confession-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .float-btn {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                bottom: 20px;
                right: 20px;
            }
            
            .welcome-title {
                font-size: 2rem;
            }
            
            .welcome-content {
                padding: 30px 20px;
            }
            
            .confession-from {
                padding-right: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 引导界面 -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="welcome-icon">
                <i class="fas fa-heart"></i>
            </div>
            <h1 class="welcome-title">心语表白墙</h1>
            <p class="welcome-subtitle">在这里，说出你不敢说的话，表达你深藏的情感。<br>记录美好时刻，传递真挚情感。</p>
            
            <div class="welcome-buttons">
                <button class="welcome-btn enter-btn" id="enterBtn">
                    <i class="fas fa-door-open"></i> 进入表白墙
                </button>
                <button class="welcome-btn admin-btn" id="adminBtn">
                    <i class="fas fa-user-shield"></i> 管理员登录
                </button>
            </div>
        </div>
    </div>
    
    <!-- 管理员登录模态框 -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-content">
            <h2 class="admin-title"><i class="fas fa-user-shield"></i> 管理员登录</h2>
            <form id="adminForm">
                <div class="form-group">
                    <label for="adminPassword">管理密码：</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div class="main-content" id="mainContent">
        <header>
            <div class="container">
                <div class="header-content">
                    <h1><i class="fas fa-heart"></i> 心语表白墙 <i class="fas fa-heart"></i></h1>
                    <p class="tagline">在这里，说出你不敢说的话，表达你深藏的情感</p>
                </div>
            </div>
        </header>
        
        <div class="container">
            <div class="main-content-inner">
                <!-- 表白列表区域 -->
                <div class="right-column">
                    <div class="post-card">
                        <h2 class="section-title"><i class="fas fa-list"></i> 表白列表</h2>
                        
                        <div class="categories">
                            <button class="category-btn active" data-type="all">全部表白</button>
                            <button class="category-btn" data-type="love">❤️ 爱情</button>
                            <button class="category-btn" data-type="friendship">🤝 友情</button>
                            <button class="category-btn" data-type="secret">😳 暗恋</button>
                            <button class="category-btn" data-type="thanks">🙏 感谢</button>
                        </div>
                        
                        <div id="confessionList" class="confession-list">
                            <!-- 表白列表会动态生成在这里 -->
                            <div class="empty-state" id="emptyState">
                                <i class="fas fa-heart-broken"></i>
                                <h3>还没有表白</h3>
                                <p>点击右下角按钮发布第一条表白</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer>
                <p>心语表白墙 | 本页面数据仅保存在您的本地浏览器中</p>
                <p>© 2023 心语表白墙 | 设计用于本地表白记录</p>
            </footer>
        </div>
        
        <!-- 浮动发布按钮 -->
        <div class="float-btn" id="floatBtn">
            <i class="fas fa-plus"></i>
        </div>
        
        <!-- 发布表白模态框 -->
        <div class="modal" id="postModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title"><i class="fas fa-edit"></i> 写下你的表白</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                
                <form id="confessionForm">
                    <div class="form-group">
                        <label for="to">向谁表白：</label>
                        <input type="text" id="to" placeholder="输入TA的名字" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="from">你的称呼：</label>
                        <input type="text" id="from" placeholder="你的名字或昵称" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="type">情感类型：</label>
                        <select id="type" required>
                            <option value="">选择情感类型</option>
                            <option value="love">❤️ 爱情表白</option>
                            <option value="friendship">🤝 友情告白</option>
                            <option value="secret">😳 悄悄暗恋</option>
                            <option value="thanks">🙏 感谢的话</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="content">表白内容：</label>
                        <textarea id="content" placeholder="写下你想对TA说的话..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn">
                        <i class="fas fa-paper-plane"></i> 发布表白
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 初始化变量
        let confessions = JSON.parse(localStorage.getItem('confessions')) || [];
        const ADMIN_PASSWORD = "xjmininb"; // 固定管理员密码
        let isAdmin = false; // 当前是否为管理员模式
        let currentFilter = 'all';
        
        // DOM 元素
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainContent = document.getElementById('mainContent');
        const enterBtn = document.getElementById('enterBtn');
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminForm = document.getElementById('adminForm');
        const adminPasswordInput = document.getElementById('adminPassword');
        
        const floatBtn = document.getElementById('floatBtn');
        const postModal = document.getElementById('postModal');
        const closeModal = document.getElementById('closeModal');
        const confessionForm = document.getElementById('confessionForm');
        const confessionList = document.getElementById('confessionList');
        const emptyState = document.getElementById('emptyState');
        const categoryButtons = document.querySelectorAll('.category-btn');
        
        // 表白类型映射
        const typeMap = {
            'love': { name: '爱情表白', emoji: '❤️', class: 'love' },
            'friendship': { name: '友情告白', emoji: '🤝', class: 'friendship' },
            'secret': { name: '悄悄暗恋', emoji: '😳', class: 'secret' },
            'thanks': { name: '感谢的话', emoji: '🙏', class: 'thanks' }
        };
        
        // 页面加载时
        document.addEventListener('DOMContentLoaded', () => {
            // 每次访问都显示引导界面
            welcomeScreen.classList.remove('hidden');
            
            // 添加示例数据（如果本地存储为空）
            if (confessions.length === 0) {
                addSampleConfessions();
            }
        });
        
        // 进入网站按钮点击事件
        enterBtn.addEventListener('click', () => {
            // 隐藏引导界面
            welcomeScreen.classList.add('hidden');
            // 显示主界面
            mainContent.style.display = 'block';
            // 渲染表白列表
            renderConfessions();
        });
        
        // 管理员登录按钮点击事件
        adminBtn.addEventListener('click', () => {
            adminModal.classList.add('active');
        });
        
        // 管理员表单提交事件
        adminForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = adminPasswordInput.value.trim();
            
            if (!password) {
                showMessage('密码不能为空！');
                return;
            }
            
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                adminModal.classList.remove('active');
                showMessage('管理员登录成功！');
                showAdminStatus();
                // 重新渲染表白列表以显示删除按钮
                renderConfessions();
            } else {
                showMessage('密码错误！');
            }
            
            // 清空输入框
            adminPasswordInput.value = '';
        });
        
        // 显示管理员状态
        function showAdminStatus() {
            const statusEl = document.createElement('div');
            statusEl.className = 'admin-status';
            statusEl.innerHTML = '<i class="fas fa-user-shield"></i> 管理员模式';
            document.body.appendChild(statusEl);
        }
        
        // 点击模态框外部关闭
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.classList.remove('active');
                adminPasswordInput.value = '';
            }
        });
        
        // 浮动按钮点击事件
        floatBtn.addEventListener('click', () => {
            postModal.classList.add('active');
        });
        
        // 关闭发布模态框
        closeModal.addEventListener('click', () => {
            postModal.classList.remove('active');
        });
        
        // 点击发布模态框外部关闭
        postModal.addEventListener('click', (e) => {
            if (e.target === postModal) {
                postModal.classList.remove('active');
            }
        });
        
        // 发布表白表单提交事件
        confessionForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const to = document.getElementById('to').value.trim();
            const from = document.getElementById('from').value.trim();
            const type = document.getElementById('type').value;
            const content = document.getElementById('content').value.trim();
            
            // 创建表白对象
            const confession = {
                id: Date.now(), // 使用时间戳作为ID
                to,
                from,
                type,
                content,
                date: new Date().toLocaleString('zh-CN')
            };
            
            // 添加到数组
            confessions.unshift(confession);
            
            // 保存到本地存储
            localStorage.setItem('confessions', JSON.stringify(confessions));
            
            // 重新渲染表白列表
            renderConfessions();
            
            // 重置表单并关闭模态框
            confessionForm.reset();
            postModal.classList.remove('active');
            
            // 显示成功消息
            showMessage('表白已发布成功！');
        });
        
        // 分类按钮点击事件
        categoryButtons.forEach(button => {
            button.addEventListener('click', function() {
                // 更新活动按钮
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                
                // 更新当前筛选类型
                currentFilter = this.dataset.type;
                
                // 重新渲染表白列表
                renderConfessions();
            });
        });
        
        // 渲染表白列表
        function renderConfessions() {
            // 清空列表
            confessionList.innerHTML = '';
            
            // 筛选表白
            let filteredConfessions = confessions;
            if (currentFilter !== 'all') {
                filteredConfessions = confessions.filter(c => c.type === currentFilter);
            }
            
            // 如果没有表白，显示空状态
            if (filteredConfessions.length === 0) {
                emptyState.style.display = 'block';
                confessionList.appendChild(emptyState);
                return;
            }
            
            // 隐藏空状态
            emptyState.style.display = 'none';
            
            // 渲染每个表白
            filteredConfessions.forEach(confession => {
                const typeInfo = typeMap[confession.type];
                
                const confessionItem = document.createElement('div');
                confessionItem.className = 'confession-item';
                confessionItem.innerHTML = `
                    <div class="confession-header">
                        <span class="confession-type ${typeInfo.class}">
                            ${typeInfo.emoji} ${typeInfo.name}
                        </span>
                        <span class="confession-date">${confession.date}</span>
                    </div>
                    <div class="confession-to">致: ${confession.to}</div>
                    <div class="confession-content">${confession.content}</div>
                    <div class="confession-from">—— ${confession.from}</div>
                    ${isAdmin ? `<button class="delete-btn" data-id="${confession.id}">
                        <i class="fas fa-trash-alt"></i>
                    </button>` : ''}
                `;
                
                confessionList.appendChild(confessionItem);
            });
            
            // 如果是管理员模式，添加删除事件监听器
            if (isAdmin) {
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        deleteConfession(id);
                    });
                });
            }
        }
        
        // 删除表白
        function deleteConfession(id) {
            if (confirm('确定要删除这条表白吗？')) {
                confessions = confessions.filter(c => c.id !== id);
                localStorage.setItem('confessions', JSON.stringify(confessions));
                renderConfessions();
                showMessage('表白已删除');
            }
        }

        // 显示消息
        function showMessage(message) {
            // 如果消息已存在，先移除
            const existingMessage = document.querySelector('.message-toast');
            if (existingMessage) {
                existingMessage.remove();
            }
            
            // 创建消息元素
            const messageEl = document.createElement('div');
            messageEl.textContent = message;
            messageEl.className = 'message-toast';
            messageEl.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: var(--shadow);
                z-index: 4000;
                animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
                animation-fill-mode: forwards;
            `;
            
            document.body.appendChild(messageEl);
            
            // 3秒后移除消息
            setTimeout(() => {
                if (messageEl.parentNode) {
                    messageEl.remove();
                }
            }, 3000);
        }
    </script>
